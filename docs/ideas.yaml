# =============================================================================
# NEW IDEAS (from grooming session)
# =============================================================================

- id: 33
  idea: "Building Groups (universal production mechanic)"
  desc: >
    Core mechanic replacing separate Mall/node/warehouse concepts.
    Adjacent buildings form a GROUP. Inside a group, resources distribute
    automatically via manifold (no paths needed). Identical buildings
    chain freely (horizontal, vertical, grid). Different buildings need
    one adjacency connection — system auto-optimizes internal flow.
    Internal connections visualized as mini rune paths (consistent look).
    Between groups: player-placed rune paths and pipes.
    Groups are the unit of management in chain manager (energy, priority).
    Constraints: landscape (buildings tied to terrain), cost, recipe dependencies.
  system: production
  tier: A
  type: mechanic
  status: locked

- id: 34
  idea: "Biome-landscape building placement"
  desc: >
    Buildings tied to specific landscape features. Miners only on ore veins,
    lava siphons only near lava, etc. This naturally limits group size
    and composition — you can't put everything in one mega-group.
    Buildings placed on matching terrain grow organic mini-factories around them.
  system: world
  tier: A
  type: mechanic
  status: locked

- id: 35
  idea: "Combat groups = organic resource pipeline"
  desc: >
    Combat groups are the PRIMARY way to obtain organic resources.
    Organics (wood, hides, herbs, creature parts) cannot be mined from terrain.
    Must come from creatures: farming/breeding OR hunting/killing (same pipeline).
    Imp camp: input weapons+food → output protection+organic loot.
    Breeding pen: input food+water → output renewable organic materials.
    T3 combat groups clear enemy zones for rare opus resources.
    Combat groups are mandatory in every run — organics are required for recipes.
    Scales like any resource group in chain manager.
  system: creatures
  tier: A
  type: mechanic
  status: locked

- id: 36
  idea: "Synthesis groups (resource creation without terrain)"
  desc: >
    Not all resources exist naturally in every biome. Synthesis groups
    create base resources from other base resources without needing terrain.
    Example: tree farm (water input → wood output) in a volcanic biome.
    Placed anywhere on valid ground. Another type of resource node, but artificial.
    Adds strategic layer: which resources to extract vs synthesize.
  system: production
  tier: A
  type: mechanic
  status: locked

