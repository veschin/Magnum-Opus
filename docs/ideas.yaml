- id: 37
  idea: "Fog of war with watchtowers"
  desc: >
    Map starts hidden. Watchtower buildings reveal cells in radius
    (like Factorio radar). Player cannot place buildings on hidden tiles.
    Simulation runs regardless of visibility — world is independent.
    Encourages exploration and strategic watchtower placement.
  system: world
  tier: A
  type: mechanic
  status: locked

- id: 38
  idea: "Minion carry (pre-path transport)"
  desc: >
    Before rune paths are built, minions auto-carry resources between
    nearby groups. Slow throughput, short range. Automatic fallback
    when no path connects two groups. Enables bootstrap gameplay
    without requiring path placement as first action.
  system: transport
  tier: A
  type: mechanic
  status: locked

- id: 39
  idea: "Building inventory (Mall → Inventory → placement)"
  desc: >
    Buildings are produced by Mall group and go to a global Inventory.
    Player places buildings from Inventory. Resources never enter inventory —
    they stay in manifolds and travel only via paths/minion carry.
    Starting kit provides free buildings for first extraction + Mall.
    Breaks circular dependency: need buildings to produce, need resources
    to build, need buildings to transport.
  system: production
  tier: A
  type: mechanic
  status: locked

- id: 40
  idea: "Biome-contextual resource quality"
  desc: >
    Resource quality depends on biome, not intrinsic property.
    Same resource has different quality per biome.
    Example: rotten wood = NORMAL in forest, HIGH in undead biome.
    Regular wood = HIGH in forest, unavailable in undead.
    Recipes specify quality requirements. 2 levels: NORMAL / HIGH.
    Creates biome-specific strategy without extra mechanics.
  system: production
  tier: A
  type: mechanic
  status: locked

- id: 41
  idea: "Creature nests as tier gates"
  desc: >
    Creature nests on map serve as tier gate encounters.
    T1→T2: clear a T1 nest via combat group pressure.
    T2→T3: clear a T2 nest (requires stronger combat chains).
    T3 unlocks EXTRACT button on cleared nests: 2x consumption → bonus output.
    Hostile factions = required targets for some mini-opus.
    Non-hostile creatures can be killed/extracted by player choice.
  system: creatures
  tier: A
  type: mechanic
  status: locked

# =============================================================================
# ENERGY — Power Grid
# =============================================================================

- id: 42
  idea: "Power grid: poles, wires, and switchboards"
  desc: >
    Energy rework: replace global energy pool with physical power grid.
    Energy sources generate power locally. To deliver it to consumer groups
    you must build POWER POLES and WIRES between them — like Factorio.

    Three new entities:
    1) Power Pole — relay node, extends wire range. Single tier, no upgrades.
       Large enough coverage that you don't micromanage them — just place
       and forget. Cheap to build (stone + wood).
    2) Wire — connection between two poles (or pole↔group). Has max length,
       carries energy up to pole capacity.
    3) Switchboard — attaches to a group. Lets player control that group's
       energy: boost priority, throttle down, or cut power entirely.
       Acts as the circuit breaker for fine-grained energy management.

    UX — auto-routing:
    Player selects two endpoints (energy source group → consumer group).
    Game auto-proposes optimal pole placement path and builds it if player
    has enough materials. Player can override with manual pole placement
    if they want a custom route.

    Impact: energy becomes spatial. You can't plop a wind turbine anywhere
    and power the whole map. Proximity matters, wire routing matters.
    Switchboard gives per-group control that the current global priority
    system lacks. Poles are deliberately simple (no tiers) to keep focus
    on interesting decisions (where to generate, how to route) rather
    than upgrade busywork.

    Replaces current global EnergyPool ratio with per-wire energy flow.
  system: energy
  tier: A
  type: mechanic
  status: open
