- id: 19
  idea: "Energy surplus/deficit as throttle"
  desc: >
    Surplus energy → production chains speed up.
    Deficit → chains slow down (player picks which chains to throttle).
    Creates dynamic optimization: where to invest energy for best ROI?
    Chain-level control, not building-level.
  system: energy
  tier: A
  type: mechanic
  status: locked

