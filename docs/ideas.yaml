- id: 31
  idea: "Tier system (3 tiers, encounter-gated)"
  desc: >
    3 tiers for 1-2h runs. Each tier = meaningful jump.
    T1 (setup, ~25min): basic extraction, simple recipes, rune paths T1, first Mall group.
    T2 (expansion, ~35min): complex recipes, biome buildings, pipes, rune paths T2.
    T3 (opus push, ~30min): final recipes, rune paths T3, opus groups.
