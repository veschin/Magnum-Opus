# ideas.yaml — all game ideas, tagged per ideas-schema.yaml
# Add new ideas at the bottom. IDs are sequential, never reuse.

# =============================================================================
# TRANSPORT
# =============================================================================

- id: 1
  idea: "Rune paths (solid transport between groups)"
  desc: >
    Rune paths = belts for solid resources, used ONLY between building groups.
    Resource models drop onto the path and roll along glowing runes.
    Tiered: T1/T2/T3 — each tier changes path visuals, speed, and capacity.
    Tier upgrade is GLOBAL — unlocking T2 auto-upgrades all existing paths.
    Within groups, manifold handles distribution (no paths needed).
  system: transport
  tier: A
  type: mechanic
  status: locked

- id: 2
  idea: "Pipes/channels (liquid transport between groups)"
  desc: >
    Liquids transported via separate pipe/channel system between building groups.
    Magical aqueducts, underground conduits. Visually distinct from rune paths.
    Within groups, liquid buildings share via manifold (no pipes needed).
  system: transport
  tier: A
  type: mechanic
  status: locked

# =============================================================================
# PRODUCTION
# =============================================================================

- id: 3
  idea: "Flexible recipe substitution"
  desc: >
    Recipes accept resource CATEGORIES, not specific items. Three efficiency levels:
    optimal (100%), allowed (150% cost), suboptimal (300% cost).
    No hard blocks — production never stops completely.
    Biome-specific resources have different efficiency in different buildings.
  system: production
  tier: A
  type: mechanic
  status: locked

- id: 4
  idea: "Resource quality (2 levels)"
  desc: >
    All resources have quality: normal / high (simplified from 3 to 2 levels).
    Quality affects recipe output and efficiency.
    Biome influences which quality is common (volcanic = high metal, forest = high wood).
    High quality = less required in recipes. Refinement buildings at nodes
    can upgrade normal → high at a cost.
  system: production
  tier: A
  type: mechanic
  status: locked

- id: 5
  idea: "Group-level management"
  desc: >
    Player manages building GROUPS as units, not individual buildings.
    Energy allocation, priority, pause/resume — all at group level.
    Chain manager is the primary optimization tool.
  system: production
  tier: A
  type: ux
  status: locked

- id: 6
  idea: "Easy Mall (first building group)"
  desc: >
    Mall = building group with constructor as first building. Trivial to set up.
    Feed it base resources → it produces buildings and tools.
    Mall is the safe default destination for all resources.
    No hand-crafting in the game — everything through Mall group.
    Grows as a city district as player adds buildings.
  system: production
  tier: A
  type: balance
  status: locked

# =============================================================================
# WORLD
# =============================================================================

- id: 7
  idea: "Deep systemic world (BotW-style)"
  desc: >
    Weather, elements, creatures, vegetation — all interconnected simulation.
    Fire + wind = wildfire. Rain fills water sources. Lightning strikes metal.
    Cold freezes water. Everything affects production.
    World runs independently of player — things happen whether you're watching or not.
  system: world
  tier: A
  type: mechanic
  status: locked

- id: 8
  idea: "Biome hazards = threat + opportunity"
  desc: >
    Each biome has signature hazards. Volcanic = lava eruptions.
    Ocean = storms/tsunamis. Forest = wildfires. Desert = sandstorms.
    Hazards destroy buildings BUT destroyed area gets enhanced properties.
    Player can deliberately sacrifice buildings for bonuses.
  system: world
  tier: A
  type: mechanic
  status: locked

- id: 9
  idea: "Sacrifice mechanic (informed gambling)"
  desc: >
    Sacrifice buildings placed in hazard zones. Hazard ZONE and TIMING are
    predictable (player sees them in advance). But outcome is probabilistic —
    player sees odds (e.g. 70% hit = bonus, 30% miss = wasted building).
    Planning = WHERE to place. Excitement = WILL it hit.
    Hit → tile enhanced + sacrifice bonus. Miss → building lost for nothing.
  system: world
  tier: B
  type: mechanic
  status: locked

- id: 10
  idea: "Biome-specific buildings"
  desc: >
    ~30% universal buildings (work everywhere), ~70% biome-specific.
    Different biome = different available buildings = different strategy.
    Universal buildings are the "glue" for multi-biome maps.
  system: world
  tier: A
  type: content
  status: locked

# =============================================================================
# CREATURES
# =============================================================================

- id: 11
  idea: "Minions = biome-native faceless workers"
  desc: >
    Minions come from the biome. Different biome = different minion types
    with different stat distributions per task. No names, no personality.
    Visual models that run around doing tasks.
  system: creatures
  tier: A
  type: mechanic
  status: locked

- id: 12
  idea: "Idle minions = beauty as emergent consequence"
  desc: >
    Beauty is NOT a trade-off — it's an emergent reward for good automation.
    Factory runs well → minions are free → they auto-decorate (player picks style).
    Factory struggling → all minions busy → base looks utilitarian.
    Player doesn't assign minions to decorate — it happens when efficiency is high.
    Cosmetic upgrades are plentiful. Beauty = visual mastery indicator.
  system: creatures
  tier: B
  type: mechanic
  status: locked

- id: 13
  idea: "Creatures = multi-role entities with behavior archetypes"
  desc: >
    No separate enemy system. Creatures have behavior archetypes:
    - Ambient: live independently, resource for hunting/breeding/harvesting
    - Territorial: attack when player expands into their zone
    - Invasive: expand on their own, reclaim player territory if unchecked
    - Event-born: spawn from mini-opus events, test preparedness
    - Opus-linked: tied to main opus, final challenge of the run
    Player choices determine role: kill → loot, breed → resource,
    harvest nests → passive income, convert → allies, trade → economy.
    Combat is passive: defense buildings (imp camps) as production chains.
    Imp camp = building that consumes weapons+food → produces protection+loot.
    T3 camps can clear enemies for rare opus resources.
  system: creatures
  tier: A
  type: mechanic
  status: locked

- id: 14
  idea: "Trading = surplus resources → meta-currency with inflation"
  desc: >
    Trader building accepts surplus resources and converts to meta-currency.
    Exchange rate has inflation — the more you trade the same resource,
    the worse the rate. Satisfactory-ticket model.
    Creates biome-specific economic strategies: abundant resource in biome
    can be traded for meta-currency to offset weaknesses across runs.
  system: meta
  tier: B
  type: mechanic
  status: locked

# =============================================================================
# PROGRESSION
# =============================================================================

- id: 15
  idea: "Magnum Opus = production milestone tree"
  desc: >
    Opus is a TREE of production throughput milestones, not item crafting.
    Main path nodes: "produce X resource at Y/min" — measurable, clear.
    Side branches: mini-opus events (optional challenges for bonuses/meta-currency).
    Final node: sustain all main-path rates simultaneously for a duration.
    Player sees entire tree at run start and plans strategy.
    Same Opus in matching biome = easier milestones. Mismatched = need synthesis groups.
  system: progression
  tier: A
  type: mechanic
  status: locked

- id: 16
  idea: "Mini-Opus = branches within Opus tree"
  desc: >
    NOT a separate event system. Mini-opus are side branches of the Opus tree.
    Attached to main-path nodes. Trigger types:
    - On-demand (player activates when ready)
    - Time-based (deadline from branch appearance)
    - Conditional (triggers when production state matches)
    Completed = bonus + meta-currency. Missed = no main-path penalty, but lost bonus.
    Examples: "survive hazard while maintaining rate", "supply resources to trader".
  system: progression
  tier: A
  type: mechanic
  status: locked

- id: 17
  idea: "Meta-currency system (3 types)"
  desc: >
    3 currency types: Gold (economy/production), Souls (creatures/combat),
    Knowledge (technology/recipes). Each earned from matching mini-opus types.
    Main Opus multiplies ALL currencies: x1.5 / x2 / x3 based on difficulty.
    Currencies spent on permanent unlocks between runs.
  system: meta
  tier: A
  type: mechanic
  status: locked

- id: 18
  idea: "Nest-gated tier progression"
  desc: >
    Tiers unlock by clearing creature nests on the map.
    T1→T2: clear a T1 nest. T2→T3: clear a T2 nest.
    T3 unlocks EXTRACT mode on cleared nests (2x consumption → bonus output).
    All recipes unlock immediately at tier transition.
    Buildings auto-upgrade on tier unlock (no demolish+rebuild).
    Forces exploration and combat engagement as natural progression.
  system: progression
  tier: A
  type: mechanic
  status: locked

# =============================================================================
