# Magnum Opus — Progression Fixtures
# Test scenarios for opus tree, milestones, mini-opus, tier gates, scoring.

fixtures:
  # ── Happy Path ──

  - id: simple_opus_tree
    description: "Standard forest opus — 5 nodes, sustain iron_ore first"
    biome: forest
    template: standard
    opus_nodes:
      - { node: 1, resource: iron_ore, rate_per_min: 4.0, tier: 1, sustained: false }
      - { node: 2, resource: iron_bar, rate_per_min: 3.0, tier: 1, sustained: false }
      - { node: 3, resource: steel_plate, rate_per_min: 2.0, tier: 2, sustained: false }
      - { node: 4, resource: hide, rate_per_min: 1.6, tier: 2, sustained: false }
      - { node: 5, resource: opus_ingot, rate_per_min: 1.0, tier: 3, sustained: false }
    mini_opus:
      - { id: trade_5_wood, parent_node: 1, type: trade_surplus, trigger: on_demand, condition: { resource: wood, amount: 5 }, reward: { currency: gold, amount: 50 } }
      - { id: fast_steel, parent_node: 3, type: speed_production, trigger: time_based, deadline_tick: 50000, condition: { resource: steel_plate, rate: 3.0 }, reward: { currency: knowledge, amount: 60 } }

  - id: milestone_sustained
    description: "First milestone being sustained — rate held for 600 ticks"
    biome: forest
    opus_nodes:
      - { node: 1, resource: iron_ore, rate_per_min: 4.0, tier: 1, sustained: false }
    production_rates:
      iron_ore: 4.5                # above required 4.0
    ticks_at_rate: 600             # exactly at sustain threshold

  - id: tier_gate_clear
    description: "T1 nest cleared — T2 should unlock"
    biome: forest
    tier: 1
    tier_gates:
      - { tier: 2, nest_id: forest_wolf_den, unlocked: false }
    pending_action:
      - { type: nest_cleared, nest_id: forest_wolf_den }

  - id: final_node_all_sustained
    description: "All main nodes sustained simultaneously — run won"
    biome: forest
    opus_nodes:
      - { node: 1, resource: iron_ore, rate_per_min: 4.0, sustained: true }
      - { node: 2, resource: iron_bar, rate_per_min: 3.0, sustained: true }
      - { node: 3, resource: steel_plate, rate_per_min: 2.0, sustained: true }
      - { node: 4, resource: hide, rate_per_min: 1.6, sustained: true }
      - { node: 5, resource: opus_ingot, rate_per_min: 1.0, sustained: true }

  - id: mini_opus_completed
    description: "On-demand mini-opus condition met — reward awarded"
    biome: forest
    mini_opus:
      - { id: trade_5_wood, type: trade_surplus, trigger: on_demand, condition: { resource: wood, amount: 5 }, completed: false }
    pending_action:
      - { type: trade_resource, resource: wood, amount: 5 }

  # ── Edge Cases ──

  - id: rate_drops_after_sustain
    description: "Rate sustained then drops — milestone stays completed (no regression)"
    biome: forest
    opus_nodes:
      - { node: 1, resource: iron_ore, rate_per_min: 4.0, sustained: true }
    production_rates:
      iron_ore: 2.0               # dropped below 4.0 but milestone already locked

  - id: timed_mini_opus_missed
    description: "Time-based mini-opus deadline passed — marked as missed"
    biome: forest
    current_tick: 51000
    mini_opus:
      - { id: fast_steel, type: speed_production, trigger: time_based, deadline_tick: 50000, condition: { resource: steel_plate, rate: 3.0 }, completed: false }

  - id: run_timeout_partial
    description: "Run timer expired — 3 of 5 milestones sustained"
    biome: forest
    current_tick: 108000           # max_ticks reached
    opus_nodes:
      - { node: 1, resource: iron_ore, sustained: true }
      - { node: 2, resource: iron_bar, sustained: true }
      - { node: 3, resource: steel_plate, sustained: true }
      - { node: 4, resource: hide, sustained: false }
      - { node: 5, resource: opus_ingot, sustained: false }
    # Expected: opus_completion = 3/5 = 0.6

  - id: all_mini_opus_missed
    description: "All mini-opus missed — run still completable, minimal meta-currency"
    biome: forest
    opus_nodes:
      - { node: 1, resource: iron_ore, sustained: true }
    mini_opus:
      - { id: trade_5_wood, completed: false, missed: true }
      - { id: fast_steel, completed: false, missed: true }

  - id: opus_needs_unavailable_resource
    description: "Opus requires resource not natural to biome — must synthesize"
    biome: volcanic
    opus_nodes:
      - { node: 1, resource: wood, rate_per_min: 2.0, tier: 1, sustained: false }
    # volcanic has wood: null quality — player must build tree_farm (synthesis)

  - id: starting_kit_with_unlocks
    description: "Starting kit enhanced by meta unlocks"
    biome: forest
    meta_unlocks: [extra_starting_miner, extra_starting_turbine]
    # Expected: base forest kit + 1 extra iron_miner + 1 extra wind_turbine
