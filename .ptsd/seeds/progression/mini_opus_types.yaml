# Magnum Opus — Mini-Opus Types
# Side branches on the opus tree. Optional challenges for meta-currency.
# 3 trigger types: on_demand, time_based, conditional

mini_opus_types:
  # ── On-Demand (activate when ready) ──

  - id: trade_surplus
    trigger: on_demand
    description: "Trade N units of resource X to wandering trader"
    currency_type: gold
    base_reward: 50
    params:
      resource_class: any_surplus
      amount_range: [5, 15]

  - id: build_monument
    trigger: on_demand
    description: "Construct a specific T2+ building"
    currency_type: knowledge
    base_reward: 40
    params:
      building_tier_min: 2

  # ── Time-Based (deadline) ──

  - id: speed_production
    trigger: time_based
    description: "Reach X rate of resource Y before tick Z"
    currency_type: knowledge
    base_reward: 60
    params:
      deadline_ticks: 1200         # 60 sec
      rate_multiplier: 1.5        # 50% above normal milestone rate

  - id: survive_hazard_producing
    trigger: time_based
    description: "Maintain production rate during hazard event"
    currency_type: souls
    base_reward: 80
    params:
      deadline_ticks: 400          # hazard duration
      min_rate_fraction: 0.8      # maintain 80% of current rate

  # ── Conditional (state match) ──

  - id: clear_nest_fast
    trigger: conditional
    description: "Clear a creature nest within N ticks of discovering it"
    currency_type: souls
    base_reward: 70
    params:
      ticks_after_discovery: 600

  - id: zero_waste
    trigger: conditional
    description: "No resources sit idle in manifold for N consecutive ticks"
    currency_type: knowledge
    base_reward: 55
    params:
      idle_threshold_ticks: 300

  - id: organic_surplus
    trigger: conditional
    description: "Produce N organic resources in a single combat group"
    currency_type: souls
    base_reward: 45
    params:
      organic_count: 20

# Branch generation rules:
# - Each branch_point on opus tree gets 1-2 mini-opus branches
# - Type selection weighted by biome:
#   forest: trade_surplus, organic_surplus more common
#   volcanic: survive_hazard_producing more common
#   desert: speed_production more common
#   ocean: build_monument more common
# - Reward scaled by opus difficulty multiplier
branch_generation:
  branches_per_point: { min: 1, max: 2 }
  biome_weights:
    forest: { trade_surplus: 3, organic_surplus: 2, build_monument: 1, speed_production: 1, survive_hazard_producing: 1, clear_nest_fast: 1, zero_waste: 1 }
    volcanic: { survive_hazard_producing: 3, clear_nest_fast: 2, speed_production: 1, trade_surplus: 1, build_monument: 1, organic_surplus: 1, zero_waste: 1 }
    desert: { speed_production: 3, trade_surplus: 2, build_monument: 1, survive_hazard_producing: 1, clear_nest_fast: 1, organic_surplus: 1, zero_waste: 1 }
    ocean: { build_monument: 3, trade_surplus: 2, organic_surplus: 1, speed_production: 1, survive_hazard_producing: 1, clear_nest_fast: 1, zero_waste: 1 }
