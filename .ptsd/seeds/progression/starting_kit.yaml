# Magnum Opus — Starting Kit
# Resolves White Spot #9 from ECS.md: starting kit composition.
# Per-biome starting buildings + resources. Affected by meta unlocks.
#
# Design note: volcanic/desert have no natural wood or water. Their constructor
# recipes use stone+metal instead of plank. Forest/ocean kits include sawmill
# for plank-based recipes. This is balanced by biome difficulty rating.

starting_kits:
  # Base kit (before meta unlocks)
  forest:
    # Easiest biome — wood and water abundant. Sawmill for plank chain.
    buildings:
      iron_miner: 2
      water_pump: 1
      iron_smelter: 1
      sawmill: 1
      tree_farm: 1                 # water → wood
      constructor: 1               # 2x2 mall building
      wind_turbine: 2
      watchtower: 1
    resources: {}                   # buildings go to Inventory, no loose resources

  volcanic:
    # Hard biome — no wood, no water. Extra stone quarry compensates.
    # Constructor recipes use stone+iron (no plank dependency).
    buildings:
      iron_miner: 2
      stone_quarry: 2              # extra quarry — stone replaces plank
      iron_smelter: 1
      constructor: 1
      wind_turbine: 3              # extra turbine — no water wheel available
      watchtower: 1
    resources: {}

  desert:
    # Medium biome — no wood, no water. Copper-rich, wind-rich.
    buildings:
      copper_miner: 2
      stone_quarry: 2              # extra quarry — stone replaces plank
      copper_smelter: 1
      constructor: 1
      wind_turbine: 2              # wind bonus in desert
      watchtower: 1
    resources: {}

  ocean:
    # Medium biome — water abundant, moderate resources.
    buildings:
      iron_miner: 1
      copper_miner: 1
      water_pump: 1
      iron_smelter: 1
      sawmill: 1
      constructor: 1
      water_wheel: 2               # ocean has abundant water
      watchtower: 1
    resources: {}

# Meta unlock bonuses (additive to base kit)
meta_unlock_bonuses:
  - unlock_id: extra_starting_miner
    effect: { add_building: { iron_miner: 1 } }
  - unlock_id: extra_starting_turbine
    effect: { add_building: { wind_turbine: 1 } }
  - unlock_id: starting_combat
    effect: { add_building: { imp_camp: 1, breeding_pen: 1 } }
  - unlock_id: starting_watchtower_upgrade
    effect: { upgrade_building: { watchtower: { fog_reveal_radius: 12 } } }
