# Magnum Opus — Milestone Configuration
# Production throughput milestones — the core of opus nodes.
# Each milestone = "produce X resource at Y/min for Z ticks"

milestones:
  # Sustain window: how long rate must be held to count as "sustained"
  sustain_window_ticks: 600        # 30 sec at 20 TPS (rolling min over window)

  # Rate measurement: ticks per measurement sample
  sample_interval_ticks: 20        # measure rate every 1 sec

  # Milestone completion: once sustained, stays completed forever (no regression)
  lock_on_sustain: true

  # Rate scaling by difficulty
  difficulty_rate_multiplier:
    easy: 0.7
    medium: 1.0
    hard: 1.4
    extreme: 1.8

# Example concrete milestones (generated from template + biome):
# These are illustrative — actual milestones are generated per run.
example_milestones:
  forest_standard_run:
    - { node: 1, resource: iron_ore, rate_per_min: 4.0, tier: 1 }
    - { node: 2, resource: iron_bar, rate_per_min: 3.0, tier: 1 }
    - { node: 3, resource: steel_plate, rate_per_min: 2.0, tier: 2 }
    - { node: 4, resource: hide, rate_per_min: 1.6, tier: 2 }
    - { node: 5, resource: opus_ingot, rate_per_min: 1.0, tier: 3 }

  volcanic_grand_run:
