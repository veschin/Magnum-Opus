# Magnum Opus — Scoring & Run Lifecycle
# Resolves White Spot #8 from ECS.md: scoring weights.
# Run end scoring formula + tier timing targets.

scoring:
  # Weight distribution (must sum to 1.0)
  weights:
    opus_completion: 0.50          # % of main-path milestones sustained
    mini_opus_score: 0.30          # completed / total mini-opus branches
    time_bonus: 0.20               # faster completion = higher bonus

  # Time bonus formula:
  # time_bonus = max(0, (max_ticks - elapsed_ticks) / max_ticks)
  # Completing at 50% of max time = 0.5 time bonus

  # Opus multiplier (based on biome-opus difficulty mismatch)
  opus_multiplier:
    easy: 1.0
    medium: 1.5
    hard: 2.0
    extreme: 3.0

  # Final score formula:
  # raw_score = opus_completion * 0.5 + mini_opus_score * 0.3 + time_bonus * 0.2
  # final_score = raw_score * 1000  (display as integer)
  # currency_earned = base_currency * raw_score * opus_multiplier

# Run lifecycle
run_lifecycle:
  max_ticks: 108000               # 90 min at 20 TPS
  tps: 20                         # ticks per second

  # Tier timing targets (for balance, not enforced)
  tier_timing:
    t1_end: 30000                 # ~25 min
    t2_end: 72000                 # ~60 min (35 min of T2)
    t3_end: 108000                # ~90 min (30 min of T3)

  # Run end conditions:
  win: all_main_milestones_sustained
  timeout: max_ticks_reached
  abandon: player_quits

  # Partial scoring on timeout:
  # opus_completion = sustained_nodes / total_nodes (can be 0.0 to 1.0)
  # Still counts even if not all sustained simultaneously

  # Abandon penalty:
  abandon_currency_multiplier: 0.0  # no currency on abandon
