# Magnum Opus — Creature Types
# All creature species in the game, organized by biome and archetype.
# 5 archetypes: ambient, territorial, invasive, event_born, opus_linked
# Each biome has at least 3 archetypes (PRD AC1).

creatures:
  # ══════════════════════════════════════
  # Forest Biome
  # ══════════════════════════════════════

  - id: forest_deer
    biome: forest
    archetype: ambient
    tier: 1
    health: 30
    territory_radius: 0           # ambient has no territory
    spawn_zone: dense_forest
    behavior:
      wander_range: 6
      flee_radius: 4
      flee_threshold: 0.5         # flee when health < 50%
    loot:
      hide: 2
      bone_meal: 1

  - id: forest_wolf
    biome: forest
    archetype: territorial
    tier: 1
    health: 60
    territory_radius: 6
    spawn_zone: dense_forest
    behavior:
      patrol_border: true
      aggression_trigger: building_in_territory
      attack_target: output_senders   # damages logistics first
      attack_dps: 5
    loot:
      hide: 3
      herbs: 1

  - id: forest_vine_creeper
    biome: forest
    archetype: invasive
    tier: 1
    health: 40
    territory_radius: 4
    spawn_zone: dense_forest
    behavior:
      expansion_rate: 0.02        # territory radius growth per tick
      spawn_children_at_radius: 8 # spawn child when territory >= this
      child_spawn_rate: 0.005
    loot:
      herbs: 3
      wood: 2

  # ══════════════════════════════════════
  # Volcanic Biome
  # ══════════════════════════════════════

  - id: lava_salamander
    biome: volcanic
    archetype: territorial
    tier: 1
    health: 80
    territory_radius: 5
    spawn_zone: lava_source
    behavior:
      patrol_border: true
      aggression_trigger: building_in_territory
      attack_target: output_senders
      attack_dps: 8
    loot:
      hide: 2
      bone_meal: 2

  - id: ash_swarm
    biome: volcanic
    archetype: invasive
    tier: 2
    health: 25
    territory_radius: 3
    spawn_zone: scorched_rock
    behavior:
      expansion_rate: 0.03        # faster expansion than forest
      spawn_children_at_radius: 6
      child_spawn_rate: 0.01
    loot:
      bone_meal: 1
      venom: 1

  - id: ember_wyrm
    biome: volcanic
    archetype: event_born
    tier: 2
    health: 150
    territory_radius: 0           # event-born don't hold territory
    spawn_zone: null              # spawns at event location
    behavior:
      lifetime_ticks: 600         # 30 sec
      aggression: always
      attack_target: nearest_building
      attack_dps: 12
    loot:
      venom: 3
      sinew: 2

  # ══════════════════════════════════════
  # Desert Biome
  # ══════════════════════════════════════

  - id: sand_beetle
    biome: desert
    archetype: ambient
    tier: 1
    health: 20
    territory_radius: 0
    spawn_zone: sand
    behavior:
      wander_range: 8
      flee_radius: 3
      flee_threshold: 0.3
    loot:
      hide: 1
      bone_meal: 1

  - id: dune_scorpion
    biome: desert
    archetype: territorial
    tier: 2
    health: 90
    territory_radius: 7
    spawn_zone: dune
    behavior:
      patrol_border: true
      aggression_trigger: building_in_territory
      attack_target: output_senders
      attack_dps: 10
    loot:
      venom: 2
      sinew: 1

  - id: crystal_golem
    biome: desert
    archetype: opus_linked
    tier: 3
    health: 300
    territory_radius: 8
    spawn_zone: mana_node
    behavior:
      spawn_trigger: opus_milestone_3  # spawns when 3rd main milestone sustained
      patrol_border: true
      aggression_trigger: building_in_territory
      attack_target: nearest_building
      attack_dps: 15
    loot:
      mana_crystal: 5
      sinew: 3

  # ══════════════════════════════════════
  # Ocean Biome
  # ══════════════════════════════════════

  - id: tide_crab
    biome: ocean
    archetype: ambient
    tier: 1
    health: 25
    territory_radius: 0
    spawn_zone: shallow_water
    behavior:
      wander_range: 5
      flee_radius: 3
      flee_threshold: 0.4
    loot:
      hide: 1
      herbs: 2

  - id: reef_serpent
    biome: ocean
    archetype: invasive
    tier: 1
    health: 50
    territory_radius: 4
    spawn_zone: coral_reef
    behavior:
      expansion_rate: 0.025
      spawn_children_at_radius: 7
      child_spawn_rate: 0.008
    loot:
      hide: 2
      venom: 1

  - id: storm_leviathan
    biome: ocean
    archetype: event_born
    tier: 3
    health: 400
    territory_radius: 0
    spawn_zone: null
    behavior:
      lifetime_ticks: 800
      aggression: always
      attack_target: nearest_building
      attack_dps: 20
    loot:
      sinew: 5
      venom: 4

# Spawn parameters (per biome)
spawn_params:
  forest:
    max_creatures: 30
    spawn_rate_base: 0.01         # probability per tick per species at capacity
  volcanic:
    max_creatures: 20
    spawn_rate_base: 0.008
  desert:
    max_creatures: 15
    spawn_rate_base: 0.006
  ocean:
    max_creatures: 25
    spawn_rate_base: 0.01
