# Magnum Opus — Creature Nests
# Tier gate encounters. Clearing a nest unlocks the next tier.
# Resolves White Spot #4 from ECS.md: nest strength scaling.

nests:
  # ── T1 Nests (clear to unlock T2) ──

  - id: forest_wolf_den
    biome: forest
    tier: 1
    hostility: hostile
    creature_type: forest_wolf
    creature_count: 5
    strength: 50                   # combat pressure needed to clear
    territory_radius: 8
    loot_on_clear:
      hide: 10
      herbs: 5

  - id: volcanic_salamander_nest
    biome: volcanic
    tier: 1
    hostility: hostile
    creature_type: lava_salamander
    creature_count: 4
    strength: 60                   # volcanic is harder
    territory_radius: 7
    loot_on_clear:
      hide: 8
      bone_meal: 8

  - id: desert_beetle_burrow
    biome: desert
    tier: 1
    hostility: hostile
    creature_type: sand_beetle     # T1 nest uses T1 creatures
    creature_count: 8
    strength: 45
    territory_radius: 6
    loot_on_clear:
      hide: 6
      bone_meal: 4

  - id: ocean_reef_nest
    biome: ocean
    tier: 1
    hostility: hostile
    creature_type: reef_serpent
    creature_count: 6
    strength: 55
    territory_radius: 7
    loot_on_clear:
      hide: 8
      herbs: 6

  # ── T2 Nests (clear to unlock T3) ──

  - id: forest_vine_heart
    biome: forest
    tier: 2
    hostility: hostile
    creature_type: forest_vine_creeper
    creature_count: 8
    strength: 120                  # ~2.4x T1 strength
    territory_radius: 10
    loot_on_clear:
      herbs: 15
      wood: 10
      sinew: 3

  - id: volcanic_wyrm_lair
    biome: volcanic
    tier: 2
    hostility: hostile
    creature_type: ash_swarm       # swarm nest
    creature_count: 12
    strength: 150
    territory_radius: 9
    loot_on_clear:
      venom: 8
      bone_meal: 10
      sinew: 5

  - id: desert_scorpion_hive
    biome: desert
    tier: 2
    hostility: hostile
    creature_type: dune_scorpion
    creature_count: 6
    strength: 130
    territory_radius: 10
    loot_on_clear:
      venom: 10
      sinew: 4

  - id: ocean_deep_rift
    biome: ocean
    tier: 2
    hostility: hostile
    creature_type: reef_serpent
    creature_count: 10
    strength: 140
    territory_radius: 10
    loot_on_clear:
      venom: 8
      sinew: 6
      herbs: 8

# Nest strength scaling (White Spot #4 resolution):
# Strategy: biome-specific with tier multiplier
# T1 base: 45-60 (clearable with 1-2 imp camps)
# T2 base: 120-150 (needs war lodge + sustained supply)
# Formula: strength = base * biome_modifier
# biome_modifier: forest=1.0, ocean=1.1, desert=0.9, volcanic=1.2

# T3 EXTRACT mode on cleared nests:
extract_mode:
  consumption_multiplier: 2.0     # combat groups near nest consume 2x inputs
  output_multiplier: 2.0          # combat groups near nest produce 2x organics
  range: 8                        # how close combat group must be to cleared nest
  tier_required: 3                # only available after T3 unlock

# Non-hostile nests (optional targets)
optional_nests:
  - id: forest_deer_grove
    biome: forest
    tier: 1
    hostility: neutral
    creature_type: forest_deer
    creature_count: 10
    strength: 20                   # easy to clear
    territory_radius: 5
    loot_on_clear:
      hide: 15
      herbs: 8
    # Clearing neutral nests = more organics, but removes renewable source
