# Magnum Opus — Creatures Fixtures
# Test scenarios for creature behavior, combat groups, nests, organic production.

fixtures:
  # ── Happy Path ──

  - id: ambient_creatures_wander
    description: "Forest biome with deer — ambient creatures wander peacefully"
    biome: forest
    grid: [16, 16]
    terrain_tiles:
      - { pos: [8, 8], type: dense_forest }
    creatures:
      - { type: forest_deer, pos: [8, 8], count: 3 }

  - id: combat_group_producing
    description: "Imp camp with full supply — produces organics + protection"
    biome: forest
    grid: [16, 16]
    placements:
      - { building: imp_camp, pos: [5, 5] }        # 2x2
      - { building: breeding_pen, pos: [7, 5] }    # 2x2
      - { building: wind_turbine, pos: [5, 7] }
    manifold_preload:
      group_at: [5, 5]
      resources: { iron_bar: 10, herbs: 20 }

  - id: territorial_aggression
    description: "Wolf pack with building in territory — triggers attack"
    biome: forest
    grid: [16, 16]
    terrain_tiles:
      - { pos: [5, 5], type: iron_vein }
    creatures:
      - { type: forest_wolf, pos: [8, 8], territory_center: [8, 8], territory_radius: 6 }
    placements:
      - { building: iron_miner, pos: [5, 5] }      # within wolf territory (dist 4.2 < 6)
      - { building: wind_turbine, pos: [6, 5] }

  - id: invasive_expansion
    description: "Vine creepers expanding territory over time"
    biome: forest
    grid: [20, 20]
    creatures:
      - { type: forest_vine_creeper, pos: [10, 10], territory_center: [10, 10], territory_radius: 4 }
    # No combat groups — invasive should expand unchecked

  - id: combat_suppresses_invasive
    description: "Combat group protection radius overlaps invasive territory — expansion suppressed"
    biome: forest
    grid: [20, 20]
    creatures:
      - { type: forest_vine_creeper, pos: [12, 10], territory_center: [12, 10], territory_radius: 4 }
    placements:
      - { building: imp_camp, pos: [8, 10] }       # protection radius 6, overlaps vine territory
      - { building: wind_turbine, pos: [8, 12] }
    manifold_preload:
      group_at: [8, 10]
      resources: { iron_bar: 10, herbs: 20 }

  - id: nest_clearing
    description: "T1 nest with combat group applying pressure — should eventually clear"
    biome: forest
    grid: [20, 20]
    nests:
      - { id: forest_wolf_den, pos: [12, 12] }
    placements:
      - { building: imp_camp, pos: [10, 10] }
      - { building: imp_camp, pos: [10, 12] }       # two camps for more pressure
      - { building: wind_turbine, pos: [10, 14] }
      - { building: wind_turbine, pos: [12, 10] }
    manifold_preload:
      group_at: [10, 10]
      resources: { iron_bar: 20, herbs: 40 }

  - id: t3_extract_mode
    description: "Cleared T2 nest + T3 unlocked — combat group gets 2x multiplier"
    biome: forest
    grid: [20, 20]
    tier: 3
    nests:
      - { id: forest_vine_heart, pos: [12, 12], cleared: true }
    placements:
      - { building: war_lodge, pos: [10, 10] }
      - { building: wind_turbine, pos: [10, 12] }
    pending_action:
      - { type: enable_extract, nest: forest_vine_heart }

  # ── Edge Cases ──

  - id: combat_no_supply
    description: "Imp camp with empty manifold — no protection, no organics"
    biome: forest
    grid: [16, 16]
    placements:
      - { building: imp_camp, pos: [5, 5] }
      - { building: wind_turbine, pos: [5, 7] }
    # No manifold_preload — empty inputs

  - id: combat_breach
    description: "Imp camp at 20% supply — below breach threshold, enemies break through"
    biome: forest
    grid: [16, 16]
    creatures:
      - { type: forest_wolf, pos: [8, 8], territory_center: [8, 8], territory_radius: 6 }
    placements:
      - { building: imp_camp, pos: [5, 5] }
      - { building: wind_turbine, pos: [5, 7] }
    manifold_preload:
      group_at: [5, 5]
      resources: { iron_bar: 1, herbs: 1 }   # very low supply

  - id: all_creatures_killed
    description: "Zone cleared of all creatures — no renewable source"
    biome: forest
    grid: [16, 16]
    creatures: []                  # all killed previously
    placements:
      - { building: breeding_pen, pos: [5, 5] }
      - { building: wind_turbine, pos: [5, 7] }
    # Breeding pen still works (produces from inputs), but no wild creatures to hunt

  - id: no_combat_group
    description: "Production chain needs organics but no combat group built"
    biome: forest
    grid: [16, 16]
    terrain_tiles:
      - { pos: [5, 5], type: iron_vein }
    placements:
      - { building: iron_miner, pos: [5, 5] }
      - { building: tannery, pos: [6, 5] }        # needs hide (organic) — no source
      - { building: wind_turbine, pos: [7, 5] }

  - id: event_born_spawn
    description: "Opus event triggers ember wyrm spawn — aggressive for 30 sec"
    biome: volcanic
    grid: [16, 16]
    placements:
      - { building: iron_miner, pos: [5, 5] }
      - { building: wind_turbine, pos: [6, 5] }
    terrain_tiles:
      - { pos: [5, 5], type: iron_vein }
    pending_action:
      - { type: trigger_event, creature: ember_wyrm, pos: [10, 10] }
