# Camera and raycasting seed data

camera_config:
  projection: orthographic
  isometric_angle_deg: 35.264  # arctan(1/sqrt(2))
  default_scale: 1.0
  zoom_min: 0.5
  zoom_max: 4.0
  zoom_step: 0.1  # per scroll tick
  pan_speed: 8.0   # tiles per second at scale=1.0
  pan_lerp_factor: 0.15  # smoothing (0=instant, 1=no move)
  bounds_margin: 2  # tiles beyond grid edge

# Isometric world-to-screen transform
# screen_x = (gx - gy) * tile_half_width
# screen_y = (gx + gy) * tile_half_height
# tile_half_width = N/2, tile_half_height = N/4
tile_pixel_size: 32  # N (in low-res pixels)

# Mouse-to-grid raycasting test cases
raycast_tests:
  - name: "center of tile (3,5)"
    mouse_screen: [128, 200]  # example screen coords
    camera_pos: [0, 0]
    zoom: 1.0
    expected_grid: [3, 5]
  - name: "zoomed in 2x, same tile"
    mouse_screen: [256, 400]
    camera_pos: [0, 0]
    zoom: 2.0
    expected_grid: [3, 5]
  - name: "cursor outside grid"
    mouse_screen: [-50, -50]
    camera_pos: [0, 0]
    zoom: 1.0
    expected_grid: null
  - name: "cursor over UI panel"
    mouse_screen: [30, 300]  # left edge, where build menu docks
    ui_panel_hit: true
    expected_grid: null

# Camera bounds clamping
bounds_tests:
  grid_size: 64
  margin: 2
  - name: "pan to center"
    input_target: [32, 32]
    clamped_to: [32, 32]
  - name: "pan past left edge"
    input_target: [-10, 32]
    clamped_to: [-2, 32]  # margin=2
  - name: "pan past bottom-right"
    input_target: [80, 80]
    clamped_to: [66, 66]  # 64 + 2

# Zoom-to-cursor invariant: tile under cursor stays under cursor
zoom_to_cursor_test:
  cursor_screen: [500, 300]
  cursor_grid_before: [15, 12]
  zoom_before: 1.0
  zoom_after: 2.0
  cursor_grid_after: [15, 12]  # must be same tile
