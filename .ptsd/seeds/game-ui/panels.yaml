# UI panel seed data

# Build menu
build_menu:
  dock: left
  categories:
    - name: Extraction
      buildings: [IronMiner, CopperMiner, StoneQuarry, WaterPump]
    - name: Processing
      buildings: [IronSmelter, CopperSmelter, Sawmill]
    - name: Mall
      buildings: [Constructor, Toolmaker, Assembler]
    - name: Combat
      buildings: [ImpCamp]
    - name: Energy
      buildings: [WindTurbine, WaterWheel, LavaGenerator, ManaReactor]
    - name: Utility
      buildings: [Watchtower, Trader, SacrificeAltar]

  # Tier locking display
  tier_display:
    current_tier: 1
    locked_buildings:
      - building: Toolmaker
        required_tier: 2
        display: "grayed, label T2"
      - building: Assembler
        required_tier: 3
        display: "grayed, label T3"
      - building: LavaGenerator
        required_tier: 2
        display: "grayed, label T2"
      - building: ManaReactor
        required_tier: 3
        display: "grayed, label T3"

  # Entry display format
  entry_fields: [icon, name, inventory_count, tier_label]

# Energy bar
energy_bar:
  dock: top
  fields: [generation, consumption, ratio_percent, surplus_indicator]
  thresholds:
    green: "ratio >= 1.10"    # surplus >= 10%
    yellow: "1.0 <= ratio < 1.10"  # 0-10% surplus
    red: "ratio < 1.0"       # deficit
  test_values:
    - generation: 100
      consumption: 80
      ratio: 1.25
      color: green
    - generation: 100
      consumption: 95
      ratio: 1.053
      color: yellow
    - generation: 80
      consumption: 100
      ratio: 0.8
      color: red
    - generation: 0
      consumption: 0
      ratio: 1.0  # 0/0 = no deficit
      color: green

# Opus tree panel
opus_tree:
  dock: right
  nodes:
    - resource: IronBar
      required_rate: 2.0
      current_rate: 2.5
      sustained: true
      display: completed_glow
    - resource: CopperBar
      required_rate: 1.5
      current_rate: 1.5
      sustained: false
      sustain_progress: 0.4
      display: in_progress_highlighted
    - resource: Plank
      required_rate: 1.0
      current_rate: 0.0
      sustained: false
      display: locked
  node_fields: [resource_icon, required_rate, current_rate, progress_bar, sustained_indicator]

# Minimap
minimap:
  dock: bottom_right
  size_pixels: 128  # fixed size regardless of window
  shows: [terrain_colors, building_dots, fog_overlay, camera_viewport_rect]
  click_action: pan_camera_to_grid_position

# Tooltips
tooltips:
  hover_delay_ms: 300
  dismiss_on: mouse_move
  building_tooltip_fields: [type, group_name, recipe, production_state, energy_consumption]
  transport_tooltip_fields: [cargo_type, throughput, tier]
  creature_tooltip_fields: [type, behavior, health]

# Edge: UI panel consumes click
panel_click_priority:
  - name: "click on build menu area"
    mouse_over_panel: true
    mouse_over_grid: true  # panel overlaps grid
    expected: panel_consumes_click
    grid_action: none
