# Recipe validation rules
# These invariants must hold for ALL BuildingType variants

invariants:
  # Extractors: buildings with terrain_req != None
  extractors_have_no_inputs:
    applies_to: [IronMiner, CopperMiner, StoneQuarry, WaterPump, ObsidianDrill, ManaExtractor, LavaSiphon]
    rule: inputs == []

  # Energy buildings with terrain req also have no inputs
  energy_terrain_no_inputs:
    applies_to: [WaterWheel, LavaGenerator]
    rule: inputs == []

  # Mall buildings output to inventory
  mall_output_to_inventory:
    applies_to: [Constructor, Toolmaker, Assembler]
    rule: output_to_inventory == true

  # Energy buildings have duration=1
  energy_duration_one:
    applies_to: [WindTurbine, WaterWheel, LavaGenerator, ManaReactor]
    rule: duration_ticks == 1

  # Utility buildings have duration=1
  utility_duration_one:
    applies_to: [Watchtower, Trader, SacrificeAltar]
    rule: duration_ticks == 1

  # All building types covered
  total_building_types: 35  # includes 3 legacy types + OpusForge

# Edge case: every BuildingType variant must have a recipe (no missing match arm)
exhaustive_coverage:
  all_variants_covered: true
  panics_on_unknown: false  # match is exhaustive, no _ => panic
