# ECS Engine — Cross-Feature Integration Fixtures
# Setup data for integration scenarios S1-S12.
# Each fixture defines a multi-feature world snapshot.
# Assertions belong in BDD/tests, not here.

fixtures:
  # ── S1: Production Pipeline (Energy + BuildingGroups + Transport) ──

  - id: production_pipeline
    description: "Energy + miners + smelter in group A; processor in group B; rune path between"
    grid: [20, 10]
    terrain_tiles:
      - { pos: [2, 3], type: iron_vein }
      - { pos: [3, 3], type: iron_vein }
    group_a:
      placements:
        - { building: wind_turbine, pos: [1, 3] }
        - { building: iron_miner, pos: [2, 3] }
        - { building: iron_miner, pos: [3, 3] }
        - { building: iron_smelter, pos: [4, 3] }
    group_b:
      placements:
        - { building: iron_smelter, pos: [12, 3] }
    transport:
      - { type: rune_path, from_group: a, to_group: b, resource: iron_ore, waypoints: [[5,3],[6,3],[7,3],[8,3],[9,3],[10,3],[11,3]] }

  # ── S2: Transport Delivery with Real Production ──

  - id: transport_delivery
    description: "Group A produces IronOre, transports to Group B smelter → IronBar"
    grid: [20, 10]
    terrain_tiles:
      - { pos: [2, 3], type: iron_vein }
      - { pos: [3, 3], type: iron_vein }
    group_a:
      placements:
        - { building: wind_turbine, pos: [1, 3] }
        - { building: iron_miner, pos: [2, 3] }
        - { building: iron_miner, pos: [3, 3] }
    group_b:
      placements:
        - { building: wind_turbine, pos: [11, 3] }
        - { building: iron_smelter, pos: [12, 3] }
    transport:
      - { type: rune_path, from_group: a, to_group: b, resource: iron_ore, waypoints: [[4,3],[5,3],[6,3],[7,3],[8,3],[9,3],[10,3]] }

  # ── S3: Energy Crisis Cascade ──

  - id: energy_crisis
    description: "Working chain sustaining milestone. Energy source removable."
    grid: [10, 10]
    terrain_tiles:
      - { pos: [2, 3], type: iron_vein }
    placements:
      - { building: wind_turbine, pos: [1, 3] }
      - { building: iron_miner, pos: [2, 3] }
      - { building: iron_smelter, pos: [3, 3] }
    opus_nodes:
      - { index: 0, resource: iron_bar, required_rate: 0.1, tier: 1 }
    run_config:
      sustain_window_ticks: 5

  # ── S4: Nest Clear → Tier Progression ──

  - id: nest_tier_progression
    description: "Combat group near nest, pressure clears nest, tier advances"
    grid: [20, 10]
    combat_group:
      placements:
        - { building: wind_turbine, pos: [3, 3] }
        - { building: imp_camp, pos: [4, 3] }
      combat_data:
        supply_ratio: 1.0
        effective_dps: 100.0
    nest:
      id: "nest_t1"
      pos: [6, 3]
      strength: 50.0
      hostility: hostile
      territory_radius: 5
    tier_gates:
      - { nest_id: "nest_t1", tier: 2 }

  # ── S5: Organic Supply Chain ──

  - id: organic_supply_chain
    description: "Combat → organics → transport → tannery → milestone"
    grid: [30, 10]
    combat_group:
      placements:
        - { building: wind_turbine, pos: [2, 3] }
        - { building: imp_camp, pos: [3, 3] }
      combat_data:
        supply_ratio: 1.0
        outputs: { hide: 1.0 }
    processing_group:
      placements:
        - { building: wind_turbine, pos: [14, 3] }
        - { building: tannery, pos: [15, 3] }
    transport:
      - { type: rune_path, from_group: combat, to_group: processing, resource: hide, waypoints_range: [4,3]-[13,3] }
    opus_nodes:
      - { index: 0, resource: treated_leather, required_rate: 0.1, tier: 2 }

  # ── S6: Group Split on Removal ──

  - id: group_split
    description: "3 buildings in row, remove middle → 2 groups"
    grid: [10, 10]
    terrain_tiles:
      - { pos: [3, 3], type: iron_vein }
      - { pos: [5, 3], type: iron_vein }
    placements:
      - { building: iron_miner, pos: [3, 3] }
      - { building: iron_smelter, pos: [4, 3] }
      - { building: iron_miner, pos: [5, 3] }
    remove_after_setup: [4, 3]

  # ── S7: Full Run Win Condition ──

  - id: run_win
    description: "Opus nodes with low required_rate, short sustain → RunWon"
    grid: [10, 10]
    terrain_tiles:
      - { pos: [2, 3], type: iron_vein }
    placements:
      - { building: wind_turbine, pos: [1, 3] }
      - { building: iron_miner, pos: [2, 3] }
      - { building: iron_smelter, pos: [3, 3] }
    opus_nodes:
      - { index: 0, resource: iron_bar, required_rate: 0.01, tier: 1 }
    run_config:
      sustain_window_ticks: 3
      sustain_ticks_required: 2
      max_ticks: 1000

  # ── S8: Diamond Network Conservation ──

  - id: diamond_network
    description: "4 groups in diamond: A→B, A→C, B→D, C→D"
    grid: [30, 20]
    terrain_tiles:
      - { pos: [2, 5], type: iron_vein }
      - { pos: [3, 5], type: iron_vein }
    groups:
      a: { pos: [2, 5], buildings: [wind_turbine, iron_miner, iron_miner] }
      b: { pos: [10, 2], buildings: [wind_turbine, iron_smelter] }
      c: { pos: [10, 8], buildings: [wind_turbine, iron_smelter] }
      d: { pos: [18, 5], buildings: [wind_turbine, iron_smelter] }
    transport:
      - { from: a, to: b, resource: iron_ore }
      - { from: a, to: c, resource: iron_ore }
      - { from: b, to: d, resource: iron_bar }
      - { from: c, to: d, resource: iron_bar }

  # ── S9: Determinism ──

  - id: determinism
    description: "Identical setup run twice, compare final state hashes"
    grid: [10, 10]
    terrain_tiles:
      - { pos: [2, 3], type: iron_vein }
    placements:
      - { building: wind_turbine, pos: [1, 3] }
      - { building: iron_miner, pos: [2, 3] }
      - { building: iron_smelter, pos: [3, 3] }
    ticks: 50
