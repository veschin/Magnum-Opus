# Magnum Opus — Energy Throttle Parameters
# Defines how surplus/deficit energy affects production speed.
# Resolves White Spot #1 (energy distribution) from ECS.md.

throttle:
  # Surplus: all groups speed up proportionally
  # ratio = totalGen / totalConsumption
  # speed_modifier = clamp(ratio, min_modifier, max_modifier)
  surplus:
    max_modifier: 1.5          # max 50% speed boost at full surplus
    # Linear scaling: ratio 1.0 = 1.0x, ratio 2.0 = 1.5x (capped)

  # Deficit: priority-based allocation
  # HIGH priority groups get energy first, then MEDIUM, then LOW
  deficit:
    min_modifier: 0.0          # fully starved = 0 speed
    # Groups get allocated proportional to their demand within priority tier
    # If remaining energy < tier demand, all groups in tier share equally

  # Balance point
  balance:
    zero_threshold: 0.001      # below this = treat as zero energy
    # At ratio = 1.0: no bonus, no penalty

  # Priority levels
  priorities:
    - id: high
      label: "Critical"
      sort_order: 0            # allocated first
    - id: medium
      label: "Normal"
      sort_order: 1
    - id: low
      label: "Background"
      sort_order: 2

  # Default priority for new groups
  default_priority: medium

# Manifold distribution within groups (resolves White Spot #1 from ECS.md):
# Strategy: proportional demand
# Each building gets resources proportional to its recipe input requirements
# relative to total demand. No starvation of small consumers.
manifold_distribution: proportional_demand
