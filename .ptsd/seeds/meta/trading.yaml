# Magnum Opus — Trading System
# Resolves White Spot #5 from ECS.md: trading inflation curve.
# Trader building converts surplus resources → meta-currency during runs.
# Satisfactory-ticket model: diminishing returns per resource.

trading:
  # Base exchange rates (currency per unit of resource)
  base_rates:
    # T1 raw — cheap
    iron_ore: { currency: gold, rate: 0.5 }
    copper_ore: { currency: gold, rate: 0.5 }
    stone: { currency: gold, rate: 0.3 }
    wood: { currency: gold, rate: 0.4 }
    water: { currency: gold, rate: 0.2 }

    # T1 processed — moderate
    iron_bar: { currency: gold, rate: 1.0 }
    copper_bar: { currency: gold, rate: 1.0 }
    plank: { currency: gold, rate: 0.8 }

    # T1 organic — souls
    hide: { currency: souls, rate: 1.5 }
    herbs: { currency: souls, rate: 1.2 }
    bone_meal: { currency: souls, rate: 0.8 }

    # T2 raw — gold (biome-specific extraction)
    obsidian_shard: { currency: gold, rate: 1.5 }
    mana_crystal: { currency: knowledge, rate: 1.8 }
    lava: { currency: gold, rate: 0.8 }

    # T2 processed — knowledge
    steel_plate: { currency: knowledge, rate: 2.0 }
    treated_leather: { currency: knowledge, rate: 1.8 }
    refined_crystal: { currency: knowledge, rate: 2.5 }
    potion_base: { currency: knowledge, rate: 1.5 }

    # T2 organic — souls
    venom: { currency: souls, rate: 3.0 }
    sinew: { currency: souls, rate: 2.5 }

    # T3 — high value knowledge
    runic_alloy: { currency: knowledge, rate: 5.0 }
    arcane_essence: { currency: knowledge, rate: 5.0 }
    opus_ingot: { currency: knowledge, rate: 10.0 }

  # Inflation model (White Spot #5 resolution):
  # Strategy: logarithmic diminishing returns
  # effective_rate = base_rate / (1 + inflation_factor * ln(1 + total_traded))
  # This means:
  #   First 10 units: ~full rate
  #   Next 10 units: ~70% rate
  #   Next 10 units: ~55% rate
  #   After 50+ units: <40% rate
  inflation:
    model: logarithmic
    factor: 0.3                    # inflation_factor in formula
    # Per-resource tracking: each resource type has its own inflation counter
    # Resets per run (not persistent across runs)

  # Trading is atomic: all resources in manifold are traded at once per tick
  # Trader processes one batch per tick when active
  tick_behavior: batch_all_surplus
