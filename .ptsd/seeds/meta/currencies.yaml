# Magnum Opus — Meta Currencies
# 3 currencies earned from mini-opus completions, multiplied by opus difficulty.

currencies:
  - id: gold
    name: "Gold"
    description: "Earned from economy/production mini-opus challenges"
    icon: coin
    source: mini_opus_economy
    # Typical earning per run: 100-500 (easy), 200-1000 (hard)

  - id: souls
    name: "Souls"
    description: "Earned from creature/combat mini-opus challenges"
    icon: wisp
    source: mini_opus_combat

  - id: knowledge
    name: "Knowledge"
    description: "Earned from technology/discovery mini-opus challenges"
    icon: scroll
    source: mini_opus_tech

# Opus multiplier applied to all currency earnings
opus_multiplier:
  easy: 1.0
  medium: 1.5
  hard: 2.0
  extreme: 3.0

# Difficulty determination:
# difficulty = biome_difficulty + opus_template_difficulty
# biome_difficulty: forest=1, ocean=2, desert=2, volcanic=3
# opus_template_difficulty: short=1, standard=2, grand=3
# combined: 2-3=easy, 4=medium, 5=hard, 6=extreme
difficulty_matrix:
  thresholds:
    easy: { min: 2, max: 3 }
    medium: { min: 4, max: 4 }
    hard: { min: 5, max: 5 }
    extreme: { min: 6, max: 6 }

# Failed mini-opus penalty (PRD edge case: "All Mini-Opus failed → reduced but not zero")
failed_run_penalty:
  all_mini_opus_failed: 0.25      # 25% of base currency (reduced, not zero)
  abandoned_run: 0.0              # 0 currency on abandon
