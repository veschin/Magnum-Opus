# Magnum Opus — Weather System
# Weather types per biome, durations, element effects on tiles.
# Weather changes at intervals, affects ElementalState on all visible tiles.

weather_types:
  - id: clear
    description: "No weather effects"
    element_effect: {}
    duration_ticks: { min: 400, max: 800 }

  - id: rain
    description: "Increases water levels, reduces fire"
    element_effect: { water: 0.05, fire: -0.02 }  # per tick
    duration_ticks: { min: 200, max: 600 }

  - id: heavy_rain
    description: "Intense rain, significant water increase"
    element_effect: { water: 0.12, fire: -0.05 }
    duration_ticks: { min: 100, max: 300 }

  - id: wind
    description: "Strong winds, spreads fire"
    element_effect: { wind: 0.6 }
    duration_ticks: { min: 200, max: 500 }

  - id: heat
    description: "Hot weather, increases fire risk"
    element_effect: { fire: 0.03 }
    duration_ticks: { min: 300, max: 600 }

  - id: cold_snap
    description: "Temperature drops, freezes water"
    element_effect: { cold: 0.08 }
    duration_ticks: { min: 150, max: 400 }

  - id: fog
    description: "Reduces watchtower reveal radius by 50%"
    element_effect: {}
    fog_penalty: 0.5
    duration_ticks: { min: 200, max: 500 }

# Weather tables per biome (weighted random)
biome_weather:
  forest:
    - { type: clear, weight: 30 }
    - { type: rain, weight: 25 }
    - { type: heavy_rain, weight: 10 }
    - { type: wind, weight: 15 }
    - { type: fog, weight: 20 }

  volcanic:
    - { type: clear, weight: 20 }
    - { type: heat, weight: 35 }
    - { type: wind, weight: 25 }
    - { type: fog, weight: 20 }

  desert:
    - { type: clear, weight: 25 }
    - { type: heat, weight: 30 }
    - { type: wind, weight: 30 }
    - { type: cold_snap, weight: 10 }  # desert nights
    - { type: fog, weight: 5 }

  ocean:
    - { type: clear, weight: 20 }
    - { type: rain, weight: 25 }
    - { type: heavy_rain, weight: 15 }
    - { type: wind, weight: 25 }
    - { type: fog, weight: 15 }
