# Magnum Opus — Biomes
# Each biome defines terrain distribution, available resources, creatures, and quality maps.
# ~30% universal buildings work everywhere, ~70% are biome-specific.
# Quality is biome-contextual: same resource has different quality per biome.

biomes:
  - id: forest
    name: "Verdant Wilds"
    description: "Dense forests, rivers, abundant wood and water. Moderate creatures."
    terrain_distribution:
      grass: 0.40
      dense_forest: 0.25
      water_source: 0.10
      stone_deposit: 0.08
      iron_vein: 0.07
      copper_vein: 0.05
      mana_node: 0.03
      impassable: 0.02
    resource_veins:
      iron_vein: { density: medium, avg_remaining: 500 }
      copper_vein: { density: low, avg_remaining: 400 }
      stone_deposit: { density: medium, avg_remaining: 600 }
      water_source: { density: high, avg_remaining: null }  # infinite
    quality_map:
      # Which resources are HIGH quality in this biome
      wood: high
      herbs: high
      water: normal
      iron_ore: normal
      copper_ore: normal
      stone: normal
      hide: normal
    unique_buildings: [tree_farm, water_wheel]
    hazard_types: [wildfire, storm]
    creature_archetypes: [ambient, territorial, invasive]
    starting_energy: wind_turbine
    difficulty_rating: 1  # easiest biome

  - id: volcanic
    name: "Ashen Caldera"
    description: "Lava flows, obsidian fields, extreme energy potential. Dangerous hazards."
    terrain_distribution:
      scorched_rock: 0.30
      lava_source: 0.15
      obsidian_vein: 0.12
      iron_vein: 0.10
      stone_deposit: 0.10
      copper_vein: 0.05
      mana_node: 0.05
      grass: 0.08
      impassable: 0.05
    resource_veins:
      iron_vein: { density: high, avg_remaining: 600 }
      obsidian_vein: { density: high, avg_remaining: 400 }
      copper_vein: { density: low, avg_remaining: 300 }
      stone_deposit: { density: medium, avg_remaining: 500 }
      lava_source: { density: high, avg_remaining: null }
    quality_map:
      obsidian_shard: high
      iron_ore: high    # volcanic iron is superior
      stone: normal
      copper_ore: normal
      wood: null         # no natural wood — must synthesize
      water: null         # no natural water
    unique_buildings: [lava_siphon, lava_generator, obsidian_drill]
    hazard_types: [eruption, ash_storm]
    creature_archetypes: [territorial, invasive, event_born]
    starting_energy: wind_turbine
    difficulty_rating: 3

  - id: desert
    name: "Shifting Sands"
    description: "Vast dunes, hidden oases, rare mana crystals. Wind-rich."
    terrain_distribution:
      sand: 0.40
      dune: 0.20
      oasis: 0.05
      stone_deposit: 0.10
      copper_vein: 0.08
      mana_node: 0.07
      iron_vein: 0.05
      impassable: 0.05
    resource_veins:
      copper_vein: { density: high, avg_remaining: 500 }
      mana_node: { density: high, avg_remaining: 350 }
      stone_deposit: { density: medium, avg_remaining: 400 }
      iron_vein: { density: low, avg_remaining: 300 }
    quality_map:
      mana_crystal: high
      copper_ore: high
      stone: normal
      iron_ore: normal
      wood: null
      water: null         # oases only
    unique_buildings: [mana_extractor]
    hazard_types: [sandstorm, heat_wave]
    creature_archetypes: [ambient, territorial, opus_linked]
    starting_energy: wind_turbine  # wind bonus in desert
    difficulty_rating: 2

  - id: ocean
    name: "Drowned Reach"
    description: "Archipelago of islands, tidal flows, coral resources. Water everywhere."
    terrain_distribution:
      shallow_water: 0.30
      coral_reef: 0.10
      sand: 0.15
      grass: 0.15
      stone_deposit: 0.08
      iron_vein: 0.05
      copper_vein: 0.07
      water_source: 0.08
      impassable: 0.02
    resource_veins:
      copper_vein: { density: medium, avg_remaining: 400 }
      iron_vein: { density: low, avg_remaining: 300 }
      stone_deposit: { density: medium, avg_remaining: 400 }
      water_source: { density: high, avg_remaining: null }
    quality_map:
      water: high
      copper_ore: normal
      herbs: high        # marine herbs
      iron_ore: normal
      stone: normal
    unique_buildings: [water_wheel, water_pump]
    hazard_types: [tsunami, storm]
    creature_archetypes: [ambient, invasive, event_born]
    starting_energy: water_wheel
    difficulty_rating: 2

# Map generation parameters (shared across biomes)
map_gen:
  default_size: [64, 64]
  starting_area_radius: 8         # revealed at start, guaranteed safe
  min_resource_veins: 12
  max_resource_veins: 20
  fog_default: hidden
  biome_seed_source: run_seed     # deterministic from run seed
