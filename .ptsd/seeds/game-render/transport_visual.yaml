# Transport visualization seed data

# Path rendering by type and tier
path_visuals:
  - type: RunePath
    tier: 1
    ground_sprite: rune_path_t1
    shimmer_speed: 0.5  # UV scroll units/sec
    color: [0.6, 0.5, 0.3]  # warm gold
  - type: RunePath
    tier: 2
    ground_sprite: rune_path_t2
    shimmer_speed: 0.8
    color: [0.4, 0.6, 0.8]  # blue-silver
  - type: RunePath
    tier: 3
    ground_sprite: rune_path_t3
    shimmer_speed: 1.2
    color: [0.7, 0.3, 0.9]  # arcane purple
  - type: Pipe
    tier: 1
    ground_sprite: pipe_t1
    liquid_scroll_speed: 0.3
    palette: water_palette

# Cargo visuals by resource type
cargo_sprites:
  IronOre: { sprite: cargo_iron_ore, color: [0.45, 0.35, 0.30] }
  CopperOre: { sprite: cargo_copper_ore, color: [0.60, 0.40, 0.20] }
  IronBar: { sprite: cargo_iron_bar, color: [0.55, 0.55, 0.55] }
  Water: { sprite: cargo_water, color: [0.20, 0.40, 0.70] }

# Cargo bounce parameters
cargo_animation:
  bounce_amplitude: 0.08  # world units
  bounce_frequency: 3.0   # Hz
  phase_offset_source: entity_id  # desync between entities

# Test scene: one rune path with 2 cargo
test_transport_scene:
  path:
    type: RunePath
    tier: 1
    segments: [[10, 10], [11, 10], [12, 10], [13, 10], [14, 10]]
    source_group: 1
    dest_group: 2
  cargo:
    - resource: IronOre
      path_progress: 0.3
    - resource: IronOre
      path_progress: 0.7

expected:
  path_sprite_count: 5  # one per segment
  cargo_sprite_count: 2
  shimmer_active: true

# Edge: path with zero cargo
empty_path:
  path:
    type: Pipe
    tier: 1
    segments: [[5, 5], [6, 5], [7, 5]]
  cargo: []
  expected:
    path_sprite_count: 3
    cargo_sprite_count: 0
    no_crash: true

# Edge: creature dies mid-frame
creature_despawn:
  creature_entity: 42
  action: despawn
  expected_scene_entity: removed_same_frame
  no_orphaned_sprites: true
