# Magnum Opus — Resource Types
# All resources in the game. Referenced by recipes, transport, manifolds.
# class: solid | liquid (determines transport type: rune path vs pipe)
# tier: 1 | 2 | 3 (minimum tier required to produce/use)
# quality_levels: which quality variants exist (biome determines which quality is available)
# source: organic_only means ONLY obtainable from combat/breeding groups

resources:
  # ── T1 Raw (extraction from terrain) ──

  - id: iron_ore
    class: solid
    tier: 1
    quality_levels: [normal, high]

  - id: copper_ore
    class: solid
    tier: 1
    quality_levels: [normal, high]

  - id: stone
    class: solid
    tier: 1
    quality_levels: [normal]

  - id: water
    class: liquid
    tier: 1

  # ── T1 Processed (synthesis/smelting) ──

  - id: iron_bar
    class: solid
    tier: 1

  - id: copper_bar
    class: solid
    tier: 1

  - id: plank
    class: solid
    tier: 1

  # ── T1 Organic (combat groups only) ──

  - id: hide
    class: solid
    tier: 1
    source: organic_only

  - id: herbs
    class: solid
    tier: 1
    source: organic_only

  - id: bone_meal
    class: solid
    tier: 1
    source: organic_only

  # ── T1 Synthesized ──

  - id: wood
    class: solid
    tier: 1
    quality_levels: [normal, high]

  # ── T2 Raw (extraction, tier-gated) ──

  - id: obsidian_shard
    class: solid
    tier: 2
    quality_levels: [normal, high]

  - id: mana_crystal
    class: solid
    tier: 2
    quality_levels: [normal, high]

  - id: lava
    class: liquid
    tier: 2

  # ── T2 Processed ──

  - id: steel_plate
    class: solid
    tier: 2

  - id: treated_leather
    class: solid
    tier: 2

  - id: refined_crystal
    class: solid
    tier: 2

  - id: potion_base
    class: liquid
    tier: 2

  # ── T2 Organic ──

  - id: venom
    class: solid
    tier: 2
    source: organic_only

  - id: sinew
    class: solid
    tier: 2
    source: organic_only

  # ── T3 Final (opus production) ──

  - id: runic_alloy
    class: solid
    tier: 3

  - id: arcane_essence
    class: solid
    tier: 3

  - id: opus_ingot
    class: solid
    tier: 3
