# Magnum Opus — Building Types
# Every building in the game. Referenced by recipes, fixtures, placement system.
# group_type: extraction | synthesis | mall | combat | energy | opus | utility
# footprint: [width, height] in tiles
# terrain_req: required terrain type (null = placeable anywhere)
# energy_consumption / energy_generation: per-tick energy values

buildings:
  # ── Extraction (must be on matching terrain) ──

  - id: iron_miner
    group_type: extraction
    tier: 1
    footprint: [1, 1]
    terrain_req: iron_vein
    energy_consumption: 5

  - id: copper_miner
    group_type: extraction
    tier: 1
    footprint: [1, 1]
    terrain_req: copper_vein
    energy_consumption: 5

  - id: stone_quarry
    group_type: extraction
    tier: 1
    footprint: [1, 1]
    terrain_req: stone_deposit
    energy_consumption: 4

  - id: water_pump
    group_type: extraction
    tier: 1
    footprint: [1, 1]
    terrain_req: water_source
    energy_consumption: 3

  - id: obsidian_drill
    group_type: extraction
    tier: 2
    footprint: [1, 1]
    terrain_req: obsidian_vein
    energy_consumption: 12

  - id: mana_extractor
    group_type: extraction
    tier: 2
    footprint: [1, 1]
    terrain_req: mana_node
    energy_consumption: 15

  - id: lava_siphon
    group_type: extraction
    tier: 2
    footprint: [1, 1]
    terrain_req: lava_source
    energy_consumption: 8

