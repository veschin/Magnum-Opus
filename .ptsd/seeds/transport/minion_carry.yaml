# Magnum Opus — Minion Carry System
# Resolves White Spot #2 from ECS.md: minion carry pathfinding.
# Fallback transport before paths are built. Slow, short-range, automatic.
# No explicit minion entities — abstract system that moves resources.

minion_carry:
  range: 5                         # manhattan distance max
  rate: 0.5                        # items per tick (vs T1 path capacity of 2)
  # Effectively 25% of T1 path throughput at 1/5 range
  pathfinding: manhattan_nearest   # simplest: find nearest group within range
  # Decision: manhattan_nearest (not A*) — minion carry is intentionally dumb
  # Players are incentivized to build real paths ASAP

  # Which resources minions will carry:
  carry_filter: surplus_only       # only carry resources the source group doesn't need
  # Surplus = manifold has resource that no building in group uses as input

  # Liquid handling:
  liquids: false                   # minions cannot carry liquids — pipes required
  # This forces early pipe-building for water-dependent chains

  # Visual:
  visual_minion_speed: 2.0         # cells per second for visual animation
  visual_carry_model: "small glowing orb on minion's back"
