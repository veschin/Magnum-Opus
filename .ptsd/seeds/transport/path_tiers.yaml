# Magnum Opus — Transport Path Tiers
# Rune paths (solids) and pipes (liquids) share the same tier system.
# Global upgrade: unlocking T2 upgrades ALL existing paths/pipes automatically.
# References TierState from progression seed.

path_tiers:
  - tier: 1
    name: "Basic Rune Path"
    capacity: 2                    # items per tick (at 20 TPS: 2 items/tick = 40/sec)
    speed: 1.0                     # cells per tick
    visual: "dim glowing runes"
    unlock: available              # available from start

  - tier: 2
    name: "Empowered Rune Path"
    capacity: 5                    # 2.5x T1
    speed: 2.0                     # 2x T1
    visual: "bright pulsing runes"
    unlock: tier_2_gate            # unlocked when T2 tier reached

  - tier: 3
    name: "Master Rune Path"
    capacity: 10                   # 5x T1
    speed: 3.0                     # 3x T1
    visual: "blazing rune conduit"
    unlock: tier_3_gate

pipe_tiers:
  - tier: 1
    name: "Stone Aqueduct"
    capacity: 3                    # liquids flow slightly faster than solids
    speed: 1.5
    visual: "stone channel, glowing liquid"
    unlock: available

  - tier: 2
    name: "Runed Aqueduct"
    capacity: 8
    speed: 3.0
    visual: "carved stone, bright liquid flow"
    unlock: tier_2_gate

  - tier: 3
    name: "Arcane Conduit"
    capacity: 15
    speed: 4.5
    visual: "floating liquid stream, no visible channel"
    unlock: tier_3_gate

# Path routing rules
routing:
  tile_cost: 1                     # each tile a path crosses costs 1 build unit
  cannot_cross: [impassable, lava_source]  # terrain types paths cannot cross
  cannot_overlap: true             # paths and pipes cannot share a tile
  max_path_length: 32             # max tiles per single path segment
  # Paths connect group output sender → group input receiver
  # One path per output-input pair
