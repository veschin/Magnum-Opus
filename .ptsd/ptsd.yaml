project:
  name: "game"

testing:
  runner: ".ptsd/test-runner.sh"
  patterns:
    files: ["magnum_opus/src/tests/**/*.rs", "magnum_opus/src/tests/*.rs"]

review:
  min_score: 7
  auto_redo: true

hooks:
  pre_commit: true
  scopes: [PRD, SEED, BDD, TEST, IMPL, TASK, STATUS]
  types: [feat, add, fix, refactor, remove, update]
